        <nav class="navbar">
            <div class="logo">

                                   value="{{ request.GET.search }}">

                    </form>

                    {% endif %}

                    <div class="user-div" id="user-div" style="display: none;">

                        <a href="{% url 'person-info' %}">My Account</a>
                        <a href="{% url 'logout' %}">Logout</a>
                        {% else %}
                        <a href="{% url 'login' %}?form=login">Login</a>

                        {% endif %}
